name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências do projeto de testes
        run: npm ci

      - name: Instalar dependências da API
        run: npm ci
        working-directory: apps/api

      - name: Instalar dependências da Web
        run: npm ci
        working-directory: apps/web

      - name: Subir MongoDB com Docker
        run: docker compose -f apps/docker-compose.yaml up -d

      - name: Iniciar API
        run: npm run dev &
        working-directory: apps/api

      - name: Iniciar Web
        run: npm run dev &
        working-directory: apps/web

      - name: Instalar browsers do Playwright
        run: npx playwright install --with-deps

      - name: Aguardar aplicação subir
        run: npx wait-on http://localhost:3000 http://localhost:3333

      - name: Executar testes
        run: npm test

      - name: Publicar relatório do Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
